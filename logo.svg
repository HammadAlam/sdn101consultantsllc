<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 72" width="310" height="72">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
  </defs>

  <!-- Icon: rounded square badge -->
  <rect x="2" y="2" width="66" height="66" rx="14" ry="14" fill="url(#iconGrad)"/>

  <!-- Cloud shape (white, inside badge) -->
  <!-- Main cloud body -->
  <path d="M14,42 Q8,42 8,36 Q8,30 14,29 Q13,22 20,20 Q27,15 34,21 Q38,15 44,18 Q52,16 54,24 Q60,24 60,30 Q60,42 52,42 Z"
        fill="white" opacity="0.95"/>

  <!-- 3 lines dropping from cloud -->
  <line x1="22" y1="42" x2="22" y2="54" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="34" y1="42" x2="34" y2="54" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="46" y1="42" x2="46" y2="54" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Horizontal connector bar -->
  <line x1="22" y1="54" x2="46" y2="54" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- 3 endpoint nodes -->
  <circle cx="22" cy="57" r="3.5" fill="#93c5fd"/>
  <circle cx="34" cy="57" r="3.5" fill="#93c5fd"/>
  <circle cx="46" cy="57" r="3.5" fill="#93c5fd"/>

  <!-- Wordmark: SDN101 -->
  <text x="82" y="50"
        font-family="Arial Black, Arial, sans-serif"
        font-size="36"
        font-weight="900"
        fill="#1e3a8a"
        letter-spacing="-0.5">SDN<tspan fill="#2563eb">101</tspan></text>
</svg>